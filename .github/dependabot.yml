version: 2
updates:
  # .NET (backend)
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: deps
    groups:
      microsoft:
        patterns:
          - 'Microsoft.*'
          - 'System.*'
      aspnetcore:
        patterns:
          - 'Microsoft.AspNetCore.*'
          - 'Microsoft.Extensions.*'
      ef-core:
        patterns:
          - 'Microsoft.EntityFrameworkCore*'
          - 'MySql.EntityFrameworkCore'
      test:
        patterns:
          - 'xunit*'
          - 'Moq'
          - 'coverlet.*'
          - 'Microsoft.NET.Test.Sdk'

  # Angular frontend
  - package-ecosystem: npm
    directory: /Applications/Pgan.PoracleWebNet.App/ClientApp
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: deps
    ignore:
      # Angular/Material majors are coordinated upgrades — pin to manual bumps
      - dependency-name: '@angular/*'
        update-types: [version-update:semver-major]
      - dependency-name: '@angular-devkit/*'
        update-types: [version-update:semver-major]
      - dependency-name: '@angular/material'
        update-types: [version-update:semver-major]
      - dependency-name: '@angular/cdk'
        update-types: [version-update:semver-major]
      # angular-eslint must be upgraded as a coordinated set via 'ng update angular-eslint'.
      # Majors add new recommended rules (e.g. prefer-control-flow) that require codebase
      # migration work, not a simple version bump.
      - dependency-name: '@angular-eslint/*'
        update-types: [version-update:semver-major]
      # TypeScript majors are gated by Angular's peer-dependency ranges — upgraded via
      # 'ng update @angular/core @angular/cli' together with Angular majors.
      - dependency-name: 'typescript'
        update-types: [version-update:semver-major]
    groups:
      angular:
        patterns:
          - '@angular/*'
          - '@angular-devkit/*'
          - '@angular/material'
          - '@angular/cdk'
      eslint:
        patterns:
          - 'eslint*'
          - '@typescript-eslint/*'
          - 'prettier'
          - 'eslint-config-*'
          - 'eslint-plugin-*'
      jest:
        patterns:
          - 'jest*'
          - '@types/jest'
          - 'jest-preset-angular'
      types:
        patterns:
          - '@types/*'

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci

  # Dockerfile base images
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - build
    commit-message:
      prefix: build
    ignore:
      # Node base image majors are coordinated with Angular upgrades — pin manually.
      - dependency-name: node
        update-types: [version-update:semver-major]
