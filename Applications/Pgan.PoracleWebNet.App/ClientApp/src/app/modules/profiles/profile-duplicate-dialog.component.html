<h2 mat-dialog-title>{{ 'PROFILES.DUPLICATE_DIALOG_TITLE' | translate }}</h2>
@if (duplicating()) {
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
}
<mat-dialog-content>
  <p class="duplicate-description">
    {{ 'PROFILES.DUPLICATE_DESC' | translate: { name: data.name } }}
  </p>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>{{ 'PROFILES.NEW_PROFILE_NAME' | translate }}</mat-label>
    <input
      matInput
      [(ngModel)]="profileName"
      [placeholder]="'PROFILES.PROFILE_NAME_PLACEHOLDER' | translate"
      maxlength="32"
      (keyup.enter)="duplicate()" />
    <mat-hint>{{ profileName.length }}/32</mat-hint>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="dialogRef.close()">{{ 'COMMON.CANCEL' | translate }}</button>
  <button mat-raised-button color="primary" (click)="duplicate()" [disabled]="duplicating() || !profileName.trim()">
    <mat-icon>content_copy</mat-icon> {{ 'PROFILES.DUPLICATE' | translate }}
  </button>
</mat-dialog-actions>
