<div class="map-toolbar">
  <div class="region-select">
    <app-region-selector
      [regions]="regionOptions()"
      [label]="'AREA_MAP.JUMP_TO_REGION' | translate"
      [placeholder]="'AREA_MAP.SEARCH_PLACEHOLDER' | translate"
      (regionSelected)="onRegionSelected($event)"></app-region-selector>
  </div>
  <button mat-icon-button [matTooltip]="'AREA_MAP.RESET_ZOOM' | translate" (click)="fitAll()">
    <mat-icon>fit_screen</mat-icon>
  </button>
  <button
    mat-icon-button
    [matTooltip]="isFullscreen() ? ('AREA_MAP.EXIT_FULLSCREEN' | translate) : ('AREA_MAP.FULLSCREEN' | translate)"
    (click)="toggleFullscreen()">
    <mat-icon>{{ isFullscreen() ? 'fullscreen_exit' : 'fullscreen' }}</mat-icon>
  </button>
</div>
@if (isFullscreen() && selectedAreas.length > 0) {
  <div class="fullscreen-selected">
    <span class="fs-selected-label">{{ 'AREA_MAP.SELECTED_COUNT' | translate: { count: selectedAreas.length } }}</span>
    <div class="fs-selected-chips">
      @for (area of selectedAreas; track area) {
        <span class="fs-chip">{{ area }}</span>
      }
    </div>
  </div>
}
<div class="map-wrapper">
  <div #mapContainer class="area-map-container"></div>
  @if (selectedAreas.length > 0) {
    <div class="map-selection-badge">{{ 'AREA_MAP.AREAS_SELECTED' | translate: { count: selectedAreas.length } }}</div>
  }
</div>
