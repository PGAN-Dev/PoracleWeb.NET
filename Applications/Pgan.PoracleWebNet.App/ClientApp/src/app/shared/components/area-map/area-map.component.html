<div class="map-toolbar">
  <div class="region-select">
    <app-region-selector
      [regions]="regionOptions()"
      label="Jump to Region"
      placeholder="Type to search..."
      (regionSelected)="onRegionSelected($event)"></app-region-selector>
  </div>
  <button mat-icon-button matTooltip="Reset zoom to show all areas" (click)="fitAll()">
    <mat-icon>fit_screen</mat-icon>
  </button>
  <button mat-icon-button [matTooltip]="isFullscreen() ? 'Exit fullscreen' : 'Fullscreen map'" (click)="toggleFullscreen()">
    <mat-icon>{{ isFullscreen() ? 'fullscreen_exit' : 'fullscreen' }}</mat-icon>
  </button>
</div>
@if (isFullscreen() && selectedAreas.length > 0) {
  <div class="fullscreen-selected">
    <span class="fs-selected-label">{{ selectedAreas.length }} selected:</span>
    <div class="fs-selected-chips">
      @for (area of selectedAreas; track area) {
        <span class="fs-chip">{{ area }}</span>
      }
    </div>
  </div>
}
<div class="map-wrapper">
  <div #mapContainer class="area-map-container"></div>
  @if (selectedAreas.length > 0) {
    <div class="map-selection-badge">{{ selectedAreas.length }} area{{ selectedAreas.length !== 1 ? 's' : '' }} selected</div>
  }
</div>
