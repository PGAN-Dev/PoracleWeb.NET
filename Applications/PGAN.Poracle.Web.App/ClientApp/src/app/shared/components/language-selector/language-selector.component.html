<mat-form-field appearance="outline" class="language-field">
  <mat-icon matPrefix>language</mat-icon>
  <mat-select [value]="selectedLanguage()" (selectionChange)="onLanguageChange($event.value)" panelClass="language-panel">
    @for (lang of languages; track lang.code) {
      <mat-option [value]="lang.code">{{ lang.label }}</mat-option>
    }
  </mat-select>
</mat-form-field>
